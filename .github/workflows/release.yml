name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: '버전 숫자 (예: 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: 'master'

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 빌드 후 mainsail.zip이 있는지 확인하고 없으면 여기서 직접 만듭니다
      - name: Check or Create Zip
        shell: bash
        run: |
          if [ ! -f ./mainsail.zip ]; then
            cd dist && zip -r ../mainsail.zip . && cd ..
          fi

      - name: Create release and upload build
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ github.event.inputs.version }}
          tag_name: v${{ github.event.inputs.version }}
          files: ./mainsail.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

